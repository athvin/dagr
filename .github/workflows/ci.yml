# dagr continuous-integration gate — ticket T7 (ticket 006).
#
# This is the gate every subsequent implementation ticket lands through
# (arch.md "Stability", "System-level acceptance" criterion 8, "Documentation").
# It runs on every pull request and on pushes to `main`. Because pull_request
# events run the workflow file from the PR head, THIS workflow gates its own PR.
#
# The job set mirrors the era-`ci` gate command list in the skill's
# quality-gates.md §2 (and scripts/run_gate.sh ci), under the toolchain pinned
# in rust-toolchain.toml (1.95.0):
#   * fmt            — cargo fmt --all --check
#   * clippy         — cargo clippy --workspace --all-targets -- -D warnings
#   * test           — cargo test --workspace
#   * rustdoc        — RUSTDOCFLAGS='-D warnings' cargo doc --workspace --no-deps
#   * audit          — cargo audit
#   * deny           — cargo deny check
#   * coverage-matrix — scripts/check-coverage-matrix.sh (system criterion 8)
#
# UI / compile-fail (trybuild) snapshot tests (T8) run ONLY under this pinned
# toolchain, so their snapshot output is byte-stable; rust-toolchain.toml is the
# single source of truth the actions-rust setup below honours.

name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Fail the whole build on any warning even outside the lint-configured paths.
  RUSTFLAGS: "-D warnings"

jobs:
  # --- Pinned-toolchain guard (arch.md "Stability" MSRV/toolchain) ------------
  # Installs the toolchain pinned in rust-toolchain.toml and asserts that rustup
  # resolves it as the active toolchain, so every other job — and T8's UI /
  # compile-fail snapshot tests — runs deterministically on 1.95.0. Satisfies
  # the Test-plan item "Pinned toolchain is honored".
  toolchain:
    name: toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and honor the pinned toolchain
        run: |
          rustup show active-toolchain
          pinned="$(sed -nE 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' rust-toolchain.toml)"
          echo "pinned channel from rust-toolchain.toml: ${pinned}"
          active="$(rustup show active-toolchain | awk '{print $1}')"
          echo "active toolchain: ${active}"
          case "${active}" in
            "${pinned}"*) echo "OK: active toolchain matches the pinned channel";;
            *) echo "MISMATCH: active '${active}' does not start with pinned '${pinned}'"; exit 1;;
          esac

  # --- Formatting -------------------------------------------------------------
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rustfmt)
        run: rustup component add rustfmt
      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  # --- Clippy with warnings denied -------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (clippy)
        run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  # --- Tests (includes the coverage-matrix integration test, SL8machine, and
  # the T8 compile-failure UI harness) ---------------------------------------
  # `cargo test --workspace` already runs the UI harness
  # (crates/core/tests/ui.rs), which compiles each tests/ui/*.rs sample under
  # the pinned toolchain (the rustc beside $CARGO — 1.95.0 here) and asserts
  # both type names appear. The explicit step below runs it on its own first so
  # a UI-snapshot mismatch is legible in the job log and unambiguously gates the
  # build (T8 DoD: "runs under the pinned toolchain in CI on every pull request
  # and gates the build"). It never blesses — DAGR_BLESS is unset, so a stale
  # snapshot fails here rather than being silently rewritten.
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: compile-failure UI harness (T8, pinned toolchain)
        run: cargo test -p dagr-core --test ui
      - name: cargo test --workspace
        run: cargo test --workspace
      # Scale benchmark (T69, ticket 076): the Performance-envelope gate. Drives a
      # thousand-node no-op graph through the REAL T24 run-loop driver
      # (`dagr_cli::scale_bench`), measures per-node framework overhead, and FAILS
      # ON REGRESSION against a checked-in budget (arch.md "Performance envelope":
      # framework overhead per node budgeted under 1 ms/node). This step runs the
      # benchmark on its own (with output captured) so a budget regression is
      # legible in the job log and unambiguously gates the build, alongside — not
      # replacing — the ordinary `cargo test --workspace` above (which also runs it).
      #
      # RUNNER NORMALIZATION / CI RELIABILITY: admission capacity is PINNED via the
      # C12 pinning flag to a fixed benchmark configuration (`bench_capacities`), so
      # the measurement is a property of dagr's overhead, not of the runner's
      # cgroup/host limits or core count — deterministic run to run and machine to
      # machine. A wall-clock benchmark on a shared runner is inherently noisy, so
      # the gate is a GENEROUS budget (16 ms/node, 16× the 1 ms spec ceiling): it
      # catches an orders-of-magnitude regression while ordinary variance never
      # flaps it. Correctness is carried by the benchmark's DETERMINISTIC invariants
      # (exactly 1000 nodes, every node succeeded, phases sum exactly, pinned
      # capacity), not by the timing number; each run uses a private per-run temp
      # base (no shared /tmp race). `--nocapture` surfaces the measured per-node
      # overhead in the log for re-baselining.
      - name: scale benchmark — Performance-envelope budget (T69)
        run: cargo test -p dagr-cli --test scale_benchmark -- --nocapture
      # Published-artifact-schema validation (T39, ticket 050). The validation
      # helper and its `jsonschema` dependency are gated behind the
      # `schema-validation` feature (OFF by default, so the runtime writers pull
      # no schema validator — T4 ADR 017 §4). This step turns the feature ON to
      # run the schema suite (C19/C20/C22 validation) AND the standing
      # fixture-corpus round-trip (T0.10 / Stability: "a corpus parsed in CI
      # forever after"), which fails loudly if any checked-in corpus fixture no
      # longer validates against its declared version's published schema. T48
      # extends this into the enduring compatibility gate + scale artifact.
      - name: artifact-schema validation + fixture-corpus round-trip (T39)
        run: cargo test -p dagr-artifact --features schema-validation --test artifact_schemas
      # C20 graph-artifact emission (T40, ticket 051): a REAL emitted artifact is
      # round-tripped against the published `schemas/graph/v1.schema.json` via the
      # same T39 helper. Gated behind cli's `schema-validation` feature (which
      # forwards to dagr-artifact's), so the `jsonschema` validator is pulled only
      # here — the shipped binary and the bare `cargo test --workspace` never do.
      - name: graph-artifact schema round-trip (T40)
        run: cargo test -p dagr-cli --features schema-validation --test graph_artifact_schema_roundtrip
      # C22 artifact validation + schema-compatibility gate (T48, ticket 059).
      # The enduring compatibility CI: the frozen fixture corpus parses forever
      # after (every checked-in fixture round-trips against its declared version's
      # published schema, directory-enumerated so new fixtures are auto-covered),
      # evolution is provably additive-only (a drift guard rejects any published
      # schema that closes an object — the mechanical shape of a non-additive
      # change), the corpus is complete (a new schema version without a matching
      # fixture fails the build), and the ten-thousand-attempt scale artifact —
      # GENERATED from the real producers (writer → fold), frozen as a corpus
      # member — validates, parses, and stays size-proportional to attempt count.
      # Deterministic + reliable: pure Rust through the same CI-/dev-scoped
      # `jsonschema` helper the steps above use (no browser, no network, no
      # unpinned install), behind the `schema-validation` feature.
      - name: artifact validation + schema-compatibility gate (T48)
        run: cargo test -p dagr-artifact --features schema-validation --test compatibility_ci

  # --- Diagram renderer reference-tool acceptance (C24 / T46) -----------------
  # arch.md C24 line 520: "both output formats are accepted by their reference
  # tools in CI: `dot` parses; Mermaid's parser accepts." This job installs the
  # two reference tools — Graphviz (`dot`) and **Mermaid's own parser**
  # (`mermaid.parse()` from the `mermaid` library, run browserless under Node) —
  # and runs the renderer's reference-tool gate over a REAL rendered 30-node
  # fixture. `DAGR_REQUIRE_RENDER_TOOLS=1` makes an absent tool a HARD FAILURE
  # here (locally, an absent tool skips so `cargo test --workspace` stays green
  # on a dev machine without Graphviz/Node), so the gate is mandatory exactly
  # where the ticket requires it. The gate has teeth: the same tests feed each
  # tool a deliberately-malformed diagram and assert it is rejected. It also runs
  # the `schema-validation`-gated fixture check, proving the checked-in 30-node
  # fixture validates against schemas/graph/v1.schema.json.
  #
  # The DoD requires "Mermaid's PARSER accepts" (057 DoD; arch.md C24 line 520),
  # NOT SVG rendering — so we do NOT use the `mmdc` CLI, which launches headless
  # Chromium via puppeteer (no Chromium deps / `--no-sandbox` in CI → the browser
  # cannot launch → the gate failed for infra reasons, not renderer reasons).
  # Instead we install the `mermaid` library plus `jsdom` (a browserless DOM) at
  # PINNED versions into a scratch project and point `DAGR_MERMAID_PARSE_DIR` at
  # it; the test calls `mermaid.parse()` directly. This removes all Chromium
  # fragility from every future PR while checking the exact arch-required
  # guarantee.
  render-reference-tools:
    name: render-reference-tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install Graphviz (the `dot` reference tool)
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          dot -V
      # Install Mermaid's parser browserless: the `mermaid` library (whose
      # `mermaid.parse()` IS Mermaid's parser) + `jsdom` (a DOM so the library's
      # DOM/DOMPurify needs are met without a browser). Pinned versions — the
      # reviewer flagged an unpinned install as a reliability risk. Installed
      # LOCALLY into a scratch dir (not `-g`) because Node resolves the parse
      # helper's bare ESM imports against a co-located `node_modules`; the test
      # writes its helper into $DAGR_MERMAID_PARSE_DIR for exactly this reason.
      - name: "Install Mermaid's parser (browserless: mermaid + jsdom, pinned)"
        run: |
          mkdir -p "${RUNNER_TEMP}/mermaid-parse"
          cd "${RUNNER_TEMP}/mermaid-parse"
          npm install --no-audit --no-fund mermaid@11.16.0 jsdom@25.0.1
          node -e "console.log('mermaid', require('mermaid/package.json').version, '| jsdom', require('jsdom/package.json').version)"
      # The 30-node render fixture validates against the published graph schema
      # (T39 helper, behind the CI-/dev-scoped `schema-validation` feature).
      - name: render fixture schema-validity (T46)
        run: cargo test -p dagr-render --features schema-validation --test fixture_schema_valid
      # `dot` parses the rendered DOT and Mermaid's parser accepts the rendered
      # Mermaid (browserless); malformed inputs are rejected (teeth). Mandatory:
      # DAGR_REQUIRE_RENDER_TOOLS. DAGR_MERMAID_PARSE_DIR is the scratch project
      # whose node_modules the parse helper resolves against.
      - name: DOT + Mermaid accepted by their reference tools (C24)
        env:
          DAGR_REQUIRE_RENDER_TOOLS: "1"
          DAGR_MERMAID_PARSE_DIR: ${{ runner.temp }}/mermaid-parse
        run: cargo test -p dagr-render --test reference_tools
      # The M3 gate demo (T49) renders the run-overlaid diagram from artifacts
      # alone; its overlay scenario feeds the OVERLAID DOT/Mermaid through the same
      # reference tools under the same mandatory env, so the M3 done-when's
      # "rendered diagram is reviewable" clause is enforced in CI (arch.md C24 line
      # 520 / M3). Absent locally it skips like the render suite above.
      - name: M3 demo overlay accepted by their reference tools (C24 / T49)
        env:
          DAGR_REQUIRE_RENDER_TOOLS: "1"
          DAGR_MERMAID_PARSE_DIR: ${{ runner.temp }}/mermaid-parse
        run: cargo test -p dagr-cli --test m3_demo_explain_a_run overlay_renders_from_artifacts_only_and_is_structurally_sound

  # --- Rustdoc-on-public-items lint (Documentation) --------------------------
  rustdoc:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: RUSTDOCFLAGS='-D warnings' cargo doc --workspace --no-deps
        run: cargo doc --workspace --no-deps

  # --- Supply-chain: advisories (cargo audit) --------------------------------
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        run: cargo audit

  # --- Supply-chain: licenses/sources/advisories/bans (cargo deny) -----------
  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: cargo deny check
        run: cargo deny check

  # --- Cross-toolchain fingerprint stability (C21 / SL4a, T41) ---------------
  # The executable form of C21's "two builds of unchanged source, on different
  # toolchains, produce the same structural fingerprint and policy hash" (T0.7
  # §5). Builds and runs the `fingerprint_fixture` example (a fixed pipeline whose
  # two version-prefixed fingerprint strings it prints) under the **pinned**
  # toolchain AND a **second** toolchain (current stable), then diffs the two
  # outputs byte-for-byte. Any divergence fails the job — the C21 cross-toolchain
  # guarantee is testable precisely because every hashed input is author-declared.
  cross-toolchain-fingerprint:
    name: cross-toolchain-fingerprint
    runs-on: ubuntu-latest
    # Override the workspace RUSTFLAGS='-D warnings': the second toolchain may
    # introduce lints the code is not obligated to be clean under (clippy/fmt on
    # the pinned toolchain are the lint gate). This job only checks fingerprint
    # byte-equality across toolchains, not lint-cleanliness on stable.
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      # Toolchain 1: the pinned channel from rust-toolchain.toml (honoured
      # automatically by rustup on `cargo run` in the repo).
      - name: Fingerprint under the pinned toolchain
        run: |
          cargo run --quiet -p dagr-cli --example fingerprint_fixture > fp-pinned.txt
          echo "pinned toolchain fingerprints:"; cat fp-pinned.txt
      # Toolchain 2: a DIFFERENT channel. `+stable` overrides the pinned channel
      # for this one invocation, so the example is built and run by a second
      # rustc. (On the runner's default image `stable` differs from the pinned
      # 1.95.0; if they ever coincide the diff still passes — equal is equal.)
      - name: Install a second toolchain (stable)
        run: rustup toolchain install stable --profile minimal
      - name: Fingerprint under the second toolchain
        run: |
          cargo +stable run --quiet -p dagr-cli --example fingerprint_fixture > fp-stable.txt
          echo "second toolchain fingerprints:"; cat fp-stable.txt
      # The load-bearing assertion: byte-identical across the two toolchains.
      - name: Compare — the fingerprints MUST be byte-identical across toolchains
        run: |
          if ! diff -u fp-pinned.txt fp-stable.txt; then
            echo "::error::C21 cross-toolchain fingerprint divergence — the two toolchains produced different fingerprints for unchanged source"
            exit 1
          fi
          echo "OK: fingerprints are byte-identical across toolchains (C21 / SL4a)"

  # --- Acceptance-criteria coverage matrix (system criterion 8) --------------
  # Verifies that every machine-classed criterion in the partition is bound to
  # an existing test (or an explicitly-deferred `unmapped` placeholder) in the
  # checked-in coverage matrix. Needs the compiled test suite so it can resolve
  # mapped test ids via `cargo test --workspace -- --list`.
  coverage-matrix:
    name: coverage-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Verify the coverage matrix
        run: bash scripts/check-coverage-matrix.sh
      - name: Self-test the coverage-matrix verifier
        run: bash scripts/check-coverage-verifier-selftest.sh
