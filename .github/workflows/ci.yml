# dagr continuous-integration gate — ticket T7 (ticket 006).
#
# This is the gate every subsequent implementation ticket lands through
# (arch.md "Stability", "System-level acceptance" criterion 8, "Documentation").
# It runs on every pull request and on pushes to `main`. Because pull_request
# events run the workflow file from the PR head, THIS workflow gates its own PR.
#
# The job set mirrors the era-`ci` gate command list in the skill's
# quality-gates.md §2 (and scripts/run_gate.sh ci), under the toolchain pinned
# in rust-toolchain.toml (1.95.0):
#   * fmt            — cargo fmt --all --check
#   * clippy         — cargo clippy --workspace --all-targets -- -D warnings
#   * test           — cargo test --workspace
#   * rustdoc        — RUSTDOCFLAGS='-D warnings' cargo doc --workspace --no-deps
#   * audit          — cargo audit
#   * deny           — cargo deny check
#   * coverage-matrix — scripts/check-coverage-matrix.sh (system criterion 8)
#
# UI / compile-fail (trybuild) snapshot tests (T8) run ONLY under this pinned
# toolchain, so their snapshot output is byte-stable; rust-toolchain.toml is the
# single source of truth the actions-rust setup below honours.

name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Fail the whole build on any warning even outside the lint-configured paths.
  RUSTFLAGS: "-D warnings"

jobs:
  # --- Pinned-toolchain guard (arch.md "Stability" MSRV/toolchain) ------------
  # Installs the toolchain pinned in rust-toolchain.toml and asserts that rustup
  # resolves it as the active toolchain, so every other job — and T8's UI /
  # compile-fail snapshot tests — runs deterministically on 1.95.0. Satisfies
  # the Test-plan item "Pinned toolchain is honored".
  toolchain:
    name: toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and honor the pinned toolchain
        run: |
          rustup show active-toolchain
          pinned="$(sed -nE 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' rust-toolchain.toml)"
          echo "pinned channel from rust-toolchain.toml: ${pinned}"
          active="$(rustup show active-toolchain | awk '{print $1}')"
          echo "active toolchain: ${active}"
          case "${active}" in
            "${pinned}"*) echo "OK: active toolchain matches the pinned channel";;
            *) echo "MISMATCH: active '${active}' does not start with pinned '${pinned}'"; exit 1;;
          esac

  # --- Formatting -------------------------------------------------------------
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rustfmt)
        run: rustup component add rustfmt
      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  # --- Clippy with warnings denied -------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (clippy)
        run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  # --- Tests (includes the coverage-matrix integration test, SL8machine, and
  # the T8 compile-failure UI harness) ---------------------------------------
  # `cargo test --workspace` already runs the UI harness
  # (crates/core/tests/ui.rs), which compiles each tests/ui/*.rs sample under
  # the pinned toolchain (the rustc beside $CARGO — 1.95.0 here) and asserts
  # both type names appear. The explicit step below runs it on its own first so
  # a UI-snapshot mismatch is legible in the job log and unambiguously gates the
  # build (T8 DoD: "runs under the pinned toolchain in CI on every pull request
  # and gates the build"). It never blesses — DAGR_BLESS is unset, so a stale
  # snapshot fails here rather than being silently rewritten.
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: compile-failure UI harness (T8, pinned toolchain)
        run: cargo test -p dagr-core --test ui
      - name: cargo test --workspace
        run: cargo test --workspace
      # Published-artifact-schema validation (T39, ticket 050). The validation
      # helper and its `jsonschema` dependency are gated behind the
      # `schema-validation` feature (OFF by default, so the runtime writers pull
      # no schema validator — T4 ADR 017 §4). This step turns the feature ON to
      # run the schema suite (C19/C20/C22 validation) AND the standing
      # fixture-corpus round-trip (T0.10 / Stability: "a corpus parsed in CI
      # forever after"), which fails loudly if any checked-in corpus fixture no
      # longer validates against its declared version's published schema. T48
      # extends this into the enduring compatibility gate + scale artifact.
      - name: artifact-schema validation + fixture-corpus round-trip (T39)
        run: cargo test -p dagr-artifact --features schema-validation --test artifact_schemas

  # --- Rustdoc-on-public-items lint (Documentation) --------------------------
  rustdoc:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: RUSTDOCFLAGS='-D warnings' cargo doc --workspace --no-deps
        run: cargo doc --workspace --no-deps

  # --- Supply-chain: advisories (cargo audit) --------------------------------
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        run: cargo audit

  # --- Supply-chain: licenses/sources/advisories/bans (cargo deny) -----------
  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: cargo deny check
        run: cargo deny check

  # --- Acceptance-criteria coverage matrix (system criterion 8) --------------
  # Verifies that every machine-classed criterion in the partition is bound to
  # an existing test (or an explicitly-deferred `unmapped` placeholder) in the
  # checked-in coverage matrix. Needs the compiled test suite so it can resolve
  # mapped test ids via `cargo test --workspace -- --list`.
  coverage-matrix:
    name: coverage-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Verify the coverage matrix
        run: bash scripts/check-coverage-matrix.sh
      - name: Self-test the coverage-matrix verifier
        run: bash scripts/check-coverage-verifier-selftest.sh
